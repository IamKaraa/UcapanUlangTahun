<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kue Ulang Tahun 🎂</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="container">
    <section class="card center fade-in">
      <div class="badge">🎂 Make a wish</div>
      <h1 class="page-title">Tiup lilinnya dulu ya sayang</h1>
      <p class="page-text">Jangan lupa make a wish sayangku...</p>

      <div class="cake-wrap space-top">
        <div class="cake-scene" aria-label="Kue ulang tahun">
          <div class="candles">
            <div class="candle"><div class="flame"></div></div>
            <div class="candle"><div class="flame"></div></div>
            <div class="candle"><div class="flame"></div></div>
          </div>
          <div class="cake-icing"></div>
          <div class="cake-drip"></div>
          <div class="cake-base"></div>
          <div class="cake-plate"></div>
        </div>

        <div class="actions">
            <button id="micBtn" class="btn secondary">Klik sebelum tiup</button>
            <button id="blowBtn" class="btn">💨</button>
        </div>

        <p id="cakeStatus" class="status-text">Lilin masih menyala ✨</p>
        <button id="nextBtn" class="btn hidden">Lanjut</button>
      </div>
    </section>
  </main>

  <script src="/js/cake.js"></script>
</body>
</html>
